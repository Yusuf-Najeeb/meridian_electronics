# Local smoke test for the production image (optional).
# Usage from backend/:  docker compose up --build
#
# Requires OPENROUTER_API_KEY in environment or in ../.env

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      BASE_URL: ${BASE_URL:-https://openrouter.ai/api/v1}
      PORT: "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
